<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawshu Nepal | Coming Soon</title>
    <meta name="description" content="Pawshu Nepal — handmade pet accessories, stationery, portraits, and community collar initiatives. Coming soon from Pokhara, Nepal.">

    <!-- Favicons -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Pawshu Nepal | Coming Soon">
    <meta property="og:description" content="Something beautiful is being crafted for pets and their humans. Handmade in Pokhara, Nepal.">
    <meta property="og:image" content="icon-512.png">
    <meta property="og:site_name" content="Pawshu Nepal">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Pawshu Nepal",
      "url": "https://pawshunepal.com",
      "logo": "https://pawshunepal.com/icon-512.png",
      "description": "Handmade pet accessories, stationery, portraits, and community collar initiatives from Pokhara, Nepal."
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink: #F170A6;
            --pink-soft: #FFF2F6;
            --pink-accent: #FFCEDF;
            --blue: #3F58A3;
            --blue-soft: #F0F4FF;
            --blue-accent: #C7D4FF;
            --dark: #1A1A2E;
            --text-body: #495478;
            --paper: #FAF8F6;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "Plus Jakarta Sans", Arial, sans-serif;
            background: var(--paper);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Full-page layout */
        .coming-soon-page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--blue-soft) 0%, var(--pink-soft) 40%, var(--paper) 100%);
            overflow: hidden;
        }

        /* Animated background blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: blob-float 12s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--pink-accent);
            top: -15%;
            left: -10%;
            animation-duration: 14s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: var(--blue-accent);
            bottom: -10%;
            right: -8%;
            animation-duration: 11s;
            animation-direction: alternate-reverse;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: var(--pink-soft);
            top: 50%;
            left: 60%;
            animation-duration: 16s;
        }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
            100% { transform: translate(15px, -10px) scale(1.02); }
        }

        /* Floating illustration accents */
        .floating-art {
            position: absolute;
            pointer-events: none;
            opacity: 0.12;
            z-index: 1;
        }

        .floating-art img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 20px rgba(63, 88, 163, 0.1));
        }

        .art-1 {
            width: clamp(100px, 15vw, 180px);
            top: 8%;
            left: 5%;
            animation: art-drift-1 10s ease-in-out infinite;
        }

        .art-2 {
            width: clamp(90px, 12vw, 150px);
            bottom: 10%;
            right: 6%;
            animation: art-drift-2 12s ease-in-out infinite;
        }

        .art-3 {
            width: clamp(80px, 10vw, 130px);
            top: 15%;
            right: 10%;
            animation: art-drift-3 11s ease-in-out infinite;
        }

        .art-4 {
            width: clamp(90px, 11vw, 140px);
            bottom: 15%;
            left: 8%;
            animation: art-drift-2 13s ease-in-out infinite alternate;
        }

        @keyframes art-drift-1 {
            0%, 100% { transform: translate(0, 0) rotate(-3deg); }
            50% { transform: translate(-12px, -18px) rotate(3deg); }
        }

        @keyframes art-drift-2 {
            0%, 100% { transform: translate(0, 0) rotate(2deg); }
            50% { transform: translate(15px, -10px) rotate(-4deg); }
        }

        @keyframes art-drift-3 {
            0%, 100% { transform: translate(0, 0) rotate(-2deg); }
            50% { transform: translate(-8px, 14px) rotate(5deg); }
        }

        /* Paw pattern overlay */
        .paw-pattern {
            position: absolute;
            inset: 0;
            background-image: url('Branding/Pattern/Pink Paw.png');
            background-size: 120px;
            background-repeat: repeat;
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
        }

        /* Content card */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 600px;
            padding: 0 24px;
            animation: fade-up 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo badge */
        .logo-badge {
            width: clamp(140px, 22vw, 200px);
            height: clamp(140px, 22vw, 200px);
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(14px, 2vw, 24px);
            box-shadow:
                0 8px 0 var(--pink),
                0 16px 40px rgba(63, 88, 163, 0.12);
            border: 3px solid var(--white);
            margin-bottom: 36px;
            animation: badge-bounce 1s 0.3s cubic-bezier(0.25, 1, 0.5, 1) both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo-badge:hover {
            transform: translateY(-4px) rotate(3deg);
            box-shadow:
                0 4px 0 var(--pink),
                0 12px 28px rgba(63, 88, 163, 0.18);
        }

        @keyframes badge-bounce {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-badge img {
            max-width: 88%;
            max-height: 88%;
            object-fit: contain;
        }

        /* Section label */
        .label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--pink);
            margin-bottom: 16px;
            display: inline-block;
            animation: fade-up 1s 0.5s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        /* Headline */
        h1 {
            font-family: "DM Serif Display", Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(40px, 7vw, 68px);
            line-height: 1.1;
            color: var(--blue);
            margin-bottom: 20px;
            animation: fade-up 1s 0.6s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        h1 span {
            color: var(--pink);
        }

        /* Description */
        .description {
            font-size: clamp(15px, 2.5vw, 18px);
            line-height: 1.65;
            color: var(--text-body);
            max-width: 480px;
            margin-bottom: 40px;
            animation: fade-up 1s 0.75s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        /* Social row */
        .social-row {
            display: flex;
            gap: 16px;
            align-items: center;
            animation: fade-up 1s 0.9s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--white);
            border: 1.5px solid var(--blue-accent);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--pink);
            border-color: var(--pink);
            transform: translateY(-4px) scale(1.1);
            box-shadow: 0 10px 24px rgba(241, 112, 166, 0.3);
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            stroke: var(--blue);
            stroke-width: 2;
            fill: none;
            transition: stroke 0.3s ease;
        }

        .social-link:hover svg {
            stroke: var(--white);
        }

        /* Decorative divider dots */
        .dot-divider {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            animation: fade-up 1s 0.65s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        .dot-divider span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--pink-accent);
        }

        .dot-divider span:nth-child(2) {
            background: var(--pink);
            width: 24px;
            border-radius: 10px;
        }

        .dot-divider span:nth-child(3) {
            background: var(--blue-accent);
        }

        /* Footer whisper */
        .footer-whisper {
            position: absolute;
            bottom: 28px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-body);
            opacity: 0.5;
            animation: fade-up 1s 1.1s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        .footer-whisper span {
            color: var(--pink);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .floating-art { opacity: 0.08; }
            .blob { filter: blur(60px); opacity: 0.25; }
            .blob-1 { width: 300px; height: 300px; }
            .blob-2 { width: 250px; height: 250px; }
            .blob-3 { width: 200px; height: 200px; }
        }

        @media (max-width: 480px) {
            .art-3, .art-4 { display: none; }
        }
    </style>
</head>
<body>
    <main class="coming-soon-page">
        <!-- Animated background blobs -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <!-- Paw pattern overlay -->
        <div class="paw-pattern"></div>

        <!-- Floating illustration accents -->
        <div class="floating-art art-1">
            <img src="Art_Folder/V1/flower cat. noL.png" alt="">
        </div>
        <div class="floating-art art-2">
            <img src="Art_Folder/V1/golden retriver.png" alt="">
        </div>
        <div class="floating-art art-3">
            <img src="Art_Folder/V1/tabby cat.png" alt="">
        </div>
        <div class="floating-art art-4">
            <img src="Art_Folder/V1/bobo wL.png" alt="">
        </div>

        <!-- Main content -->
        <div class="content-wrapper">
            <div class="logo-badge">
                <img src="Branding/Logo/Paw Shu Logo_Pink.png" alt="Pawshu Nepal Logo">
            </div>

            <span class="label">Handmade in Pokhara, Nepal</span>

            <h1>Something <span>Pawsome</span> is Coming</h1>

            <div class="dot-divider">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <p class="description">
                We're crafting something special for pets and the people who love them. Handmade accessories, art, and a whole lot of love — stay tuned.
            </p>

            <!-- Social links -->
            <div class="social-row">
                <a href="https://www.instagram.com/pawshunepal" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                        <circle cx="12" cy="12" r="5"/>
                        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
                    </svg>
                </a>
                <a href="https://www.facebook.com/pawshunepal" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                    </svg>
                </a>
                <a href="https://www.tiktok.com/@pawshunepal" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="TikTok">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
                    </svg>
                </a>
            </div>
        </div>

        <div class="footer-whisper">
            Made with <span>♥</span> by the Pawshu Pack
        </div>
    </main>
</body>
</html>
