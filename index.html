<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawshu Nepal | Coming Soon</title>
    <meta name="description"
        content="Pawshu Nepal — handmade pet accessories, stationery, portraits, and community collar initiatives. Coming soon from Pokhara, Nepal.">

    <!-- Favicons -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Pawshu Nepal | Coming Soon">
    <meta property="og:description"
        content="Something beautiful is being crafted for pets and their humans. Handmade in Pokhara, Nepal.">
    <meta property="og:image" content="icon-512.png">
    <meta property="og:site_name" content="Pawshu Nepal">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Pawshu Nepal",
      "url": "https://pawshunepal.com",
      "logo": "https://pawshunepal.com/icon-512.png",
      "description": "Handmade pet accessories, stationery, portraits, and community collar initiatives from Pokhara, Nepal."
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --pink: #F170A6;
            --pink-soft: #FFF2F6;
            --pink-accent: #FFCEDF;
            --blue: #3F58A3;
            --blue-soft: #F0F4FF;
            --blue-accent: #C7D4FF;
            --dark: #1A1A2E;
            --text-body: #495478;
            --paper: #FAF8F6;
            --white: #FFFFFF;
            --bg-gradient: linear-gradient(145deg, var(--blue-soft) 0%, var(--pink-soft) 40%, var(--paper) 100%);
            --social-bg: var(--white);
            --social-border: var(--blue-accent);
            --logo-shadow: rgba(63, 88, 163, 0.12);
            --logo-shadow-hover: rgba(241, 112, 166, 0.2);
            --paw-opacity: 0.03;
            color-scheme: light dark;
        }

        /* Dark mode overrides */
        @media (prefers-color-scheme: dark) {
            :root {
                --pink: #F7A0C4;
                --pink-soft: #2A1F28;
                --pink-accent: #5C3A4E;
                --blue: #8DA4E8;
                --blue-soft: #1C2035;
                --blue-accent: #3A4570;
                --dark: #F0EDE8;
                --text-body: #B0B8D0;
                --paper: #121218;
                --white: #1C1C26;
                --bg-gradient: linear-gradient(145deg, #161828 0%, #1E1520 40%, #121218 100%);
                --social-bg: rgba(255, 255, 255, 0.06);
                --social-border: rgba(141, 164, 232, 0.25);
                --logo-shadow: rgba(141, 164, 232, 0.15);
                --logo-shadow-hover: rgba(247, 160, 196, 0.25);
                --paw-opacity: 0.02;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "Plus Jakarta Sans", Arial, sans-serif;
            background: var(--paper);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Full-page layout — true center */
        .coming-soon-page {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            overflow: hidden;
            padding: 60px 24px;
        }

        /* Animated background blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: blob-float 12s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--pink-accent);
            top: -15%;
            left: -10%;
            animation-duration: 14s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: var(--blue-accent);
            bottom: -10%;
            right: -8%;
            animation-duration: 11s;
            animation-direction: alternate-reverse;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: var(--pink-soft);
            top: 50%;
            left: 60%;
            animation-duration: 16s;
        }

        @keyframes blob-float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -25px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 15px) scale(0.95);
            }

            100% {
                transform: translate(15px, -10px) scale(1.02);
            }
        }

        /* Floating illustration accents */
        .floating-art {
            position: absolute;
            pointer-events: none;
            opacity: 0.12;
            z-index: 1;
        }

        .floating-art img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 20px rgba(63, 88, 163, 0.1));
        }

        .art-1 {
            width: clamp(100px, 15vw, 180px);
            top: 8%;
            left: 5%;
            animation: art-drift-1 10s ease-in-out infinite;
        }

        .art-2 {
            width: clamp(90px, 12vw, 150px);
            bottom: 10%;
            right: 6%;
            animation: art-drift-2 12s ease-in-out infinite;
        }

        .art-3 {
            width: clamp(80px, 10vw, 130px);
            top: 15%;
            right: 10%;
            animation: art-drift-3 11s ease-in-out infinite;
        }

        .art-4 {
            width: clamp(90px, 11vw, 140px);
            bottom: 15%;
            left: 8%;
            animation: art-drift-2 13s ease-in-out infinite alternate;
        }

        @keyframes art-drift-1 {

            0%,
            100% {
                transform: translate(0, 0) rotate(-3deg);
            }

            50% {
                transform: translate(-12px, -18px) rotate(3deg);
            }
        }

        @keyframes art-drift-2 {

            0%,
            100% {
                transform: translate(0, 0) rotate(2deg);
            }

            50% {
                transform: translate(15px, -10px) rotate(-4deg);
            }
        }

        @keyframes art-drift-3 {

            0%,
            100% {
                transform: translate(0, 0) rotate(-2deg);
            }

            50% {
                transform: translate(-8px, 14px) rotate(5deg);
            }
        }

        /* Paw pattern overlay */
        .paw-pattern {
            position: absolute;
            inset: 0;
            background-image: url('Branding/Pattern/Pink Paw.png');
            background-size: 120px;
            background-repeat: repeat;
            opacity: var(--paw-opacity);
            z-index: 1;
            pointer-events: none;
        }

        /* Content wrapper — centered */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fade-up 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo-img {
            width: clamp(150px, 25vw, 260px);
            height: auto;
            object-fit: contain;
            margin-bottom: 28px;
            filter: drop-shadow(0 8px 24px var(--logo-shadow));
            animation: badge-bounce 1s 0.3s cubic-bezier(0.25, 1, 0.5, 1) both;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .logo-img:hover {
            transform: translateY(-4px) scale(1.03);
            filter: drop-shadow(0 12px 32px var(--logo-shadow-hover));
        }

        @keyframes badge-bounce {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.85);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Section label */
        .label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--pink);
            margin-bottom: 14px;
            display: inline-block;
            animation: fade-up 1s 0.5s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        /* Headline */
        h1 {
            font-family: "DM Serif Display", Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(36px, 7vw, 68px);
            line-height: 1.1;
            color: var(--blue);
            margin-bottom: 18px;
            animation: fade-up 1s 0.6s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        h1 span {
            color: var(--pink);
        }

        /* Description */
        .description {
            font-size: clamp(14px, 2.5vw, 18px);
            line-height: 1.65;
            color: var(--text-body);
            max-width: 480px;
            margin-bottom: 32px;
            animation: fade-up 1s 0.75s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        /* Decorative divider dots */
        .dot-divider {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            animation: fade-up 1s 0.65s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        .dot-divider span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--pink-accent);
        }

        .dot-divider span:nth-child(2) {
            background: var(--pink);
            width: 24px;
            border-radius: 10px;
        }

        .dot-divider span:nth-child(3) {
            background: var(--blue-accent);
        }

        /* Social row */
        .social-row {
            display: flex;
            gap: 16px;
            align-items: center;
            animation: fade-up 1s 0.9s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--social-bg);
            border: 1.5px solid var(--social-border);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--pink);
            border-color: var(--pink);
            transform: translateY(-4px) scale(1.1);
            box-shadow: 0 10px 24px rgba(241, 112, 166, 0.3);
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            stroke: var(--blue);
            stroke-width: 2;
            fill: none;
            transition: stroke 0.3s ease;
        }

        .social-link:hover svg {
            stroke: #FFFFFF;
        }

        /* Footer whisper */
        .footer-whisper {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-body);
            opacity: 0.5;
            animation: fade-up 1s 1.1s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        .footer-whisper span {
            color: var(--pink);
        }

        /* Responsive — Tablet */
        @media (max-width: 768px) {
            .coming-soon-page {
                padding: 48px 20px;
            }

            .floating-art {
                opacity: 0.08;
            }

            .blob {
                filter: blur(60px);
                opacity: 0.25;
            }

            .blob-1 {
                width: 300px;
                height: 300px;
            }

            .blob-2 {
                width: 250px;
                height: 250px;
            }

            .blob-3 {
                width: 200px;
                height: 200px;
            }

            .social-link {
                width: 44px;
                height: 44px;
            }
        }

        /* Responsive — Mobile */
        @media (max-width: 480px) {
            .coming-soon-page {
                padding: 40px 16px;
            }

            .art-3,
            .art-4 {
                display: none;
            }

            .logo-img {
                width: clamp(120px, 40vw, 180px);
                margin-bottom: 20px;
            }

            h1 {
                font-size: clamp(30px, 8vw, 42px);
                margin-bottom: 14px;
            }

            .label {
                font-size: 10px;
                letter-spacing: 2.5px;
                margin-bottom: 10px;
            }

            .description {
                font-size: 14px;
                margin-bottom: 24px;
            }

            .dot-divider {
                margin-bottom: 18px;
            }

            .social-link {
                width: 42px;
                height: 42px;
            }

            .social-link svg {
                width: 18px;
                height: 18px;
            }

            .footer-whisper {
                bottom: 14px;
                font-size: 11px;
            }
        }

        /* Very small screens */
        @media (max-height: 600px) {
            .logo-img {
                width: clamp(100px, 20vw, 140px);
                margin-bottom: 16px;
            }

            h1 {
                font-size: clamp(26px, 6vw, 36px);
                margin-bottom: 10px;
            }

            .description {
                margin-bottom: 20px;
            }
        }

        /* Dark mode for floating art */
        @media (prefers-color-scheme: dark) {
            .floating-art {
                opacity: 0.06;
            }

            .blob {
                opacity: 0.2;
            }
        }
    </style>
</head>

<body>
    <main class="coming-soon-page">
        <!-- Animated background blobs -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <!-- Paw pattern overlay -->
        <div class="paw-pattern"></div>

        <!-- Floating illustration accents -->
        <div class="floating-art art-1">
            <img src="Art_Folder/V1/flower cat. noL.png" alt="">
        </div>
        <div class="floating-art art-2">
            <img src="Art_Folder/V1/golden retriver.png" alt="">
        </div>
        <div class="floating-art art-3">
            <img src="Art_Folder/V1/tabby cat.png" alt="">
        </div>
        <div class="floating-art art-4">
            <img src="Art_Folder/V1/bobo wL.png" alt="">
        </div>

        <!-- Main content -->
        <div class="content-wrapper">
            <img src="Branding/Logo/Paw Shu Logo_Pink.png" alt="Pawshu Nepal Logo" class="logo-img">

            <span class="label">Handmade in Pokhara, Nepal</span>

            <h1>Something <span>Pawsome</span> is Coming</h1>

            <div class="dot-divider">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <p class="description">
                We're crafting something special for pets and the people who love them. Handmade accessories, art, and a
                whole lot of love — stay tuned.
            </p>

            <!-- Social links -->
            <div class="social-row">
                <a href="https://www.instagram.com/pawshu.nepal/" target="_blank" rel="noopener noreferrer"
                    class="social-link" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                        <circle cx="12" cy="12" r="5" />
                        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
                    </svg>
                </a>
                <a href="https://www.facebook.com/profile.php?id=61582429302836#" target="_blank"
                    rel="noopener noreferrer" class="social-link" aria-label="Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
                    </svg>
                </a>
                <a href="https://www.tiktok.com/@pawshu.nepal" target="_blank" rel="noopener noreferrer"

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" />
                    </svg>
                </a>
                <a href="https://www.daraz.com.np/shop/xq5lupce?path=index.htm&lang=en&pageTypeId=1" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Daraz">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                </a>
            </div>
        </div>

        <div class="footer-whisper">
            Made with <span>♥</span> by the Pawshu Pack
        </div>
    </main>
</body>

</html>
